version: "1.0"
agent:
  name: resume_agent
  description: >
    ReAct Agent，负责简历优化。使用工具调用修改简历板块，
    并向用户反馈修改内容和原因。
  system_prompt_path: ./system.md
  system_prompt_args:
    resume_json: "{}"
    target_title: ""
    target_company: ""
    jd_text: ""
    available_tools: "（无）"
    edit_tools_available: true
    job_match_tool_available: true
  model_defaults:
    temperature: 0.4
    max_tokens: 4000
