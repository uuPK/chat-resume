servers:
  typescript-language-server:
    command: typescript-language-server
    args:
      - --stdio
    rootMarkers:
      - frontend/package.json
      - frontend/tsconfig.json
  pyright:
    command: uv
    args:
      - run
      - --project
      - backend
      - basedpyright-langserver
      - --stdio
    rootMarkers:
      - pyrightconfig.json
      - backend/pyrightconfig.json
      - backend/pyproject.toml
