<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火山引擎ASR功能测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .test-section {
            margin-bottom: 40px;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }
        .test-section h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            background: #0056b3;
            transform: translateY(-1px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .record-button {
            background: #28a745;
            font-size: 16px;
            padding: 15px 30px;
        }
        .record-button.recording {
            background: #dc3545;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .stop-button {
            background: #dc3545;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .transcription {
            background: #e7f3ff;
            border: 2px solid #007bff;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-green { background: #28a745; }
        .status-red { background: #dc3545; }
        .status-yellow { background: #ffc107; }
        .config-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .config-table th, .config-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .config-table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .audio-visualizer {
            display: flex;
            align-items: center;
            gap: 2px;
            margin: 10px 0;
        }
        .audio-bar {
            width: 4px;
            height: 20px;
            background: #ccc;
            border-radius: 2px;
            transition: height 0.1s;
        }
        .audio-bar.active {
            background: #007bff;
        }
        .permission-notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 火山引擎ASR功能测试</h1>
        <p>测试端到端实时语音大模型在面试系统中的集成效果</p>
        
        <div class="test-section">
            <h3>1. 系统状态检查</h3>
            <button onclick="checkSystemStatus()">🔍 检查系统状态</button>
            <div id="systemStatus"></div>
        </div>

        <div class="test-section">
            <h3>2. ASR配置信息</h3>
            <button onclick="getASRConfig()">⚙️ 获取ASR配置</button>
            <div id="configResult"></div>
        </div>
        
        <div class="test-section">
            <h3>3. 语音录制和识别测试</h3>
            <div class="permission-notice">
                <strong>注意:</strong> 首次使用需要授权麦克风权限。请在浏览器弹出权限请求时点击"允许"。
            </div>
            
            <div style="margin: 20px 0;">
                <button id="recordButton" class="record-button" onclick="toggleRecording()">
                    🎤 开始录音
                </button>
                <button id="testRecognition" onclick="testRecognition()">🧪 测试识别</button>
            </div>
            
            <div id="recordingStatus"></div>
            <div class="audio-visualizer" id="audioVisualizer" style="display: none;">
                <!-- 音频可视化条 -->
            </div>
            <div id="recordingResult"></div>
        </div>

        <div class="test-section">
            <h3>4. 面试场景模拟</h3>
            <p>模拟真实的面试语音交互场景</p>
            <button onclick="simulateInterview()">🎯 开始面试模拟</button>
            <div id="interviewResult"></div>
        </div>

        <div class="test-section">
            <h3>5. 性能测试</h3>
            <button onclick="runPerformanceTest()">⚡ 运行性能测试</button>
            <div id="performanceResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioStream = null;
        let recordingStartTime = 0;
        
        function getAuthHeaders() {
            // 在实际应用中，这应该从localStorage或其他地方获取
            return {}; // 测试时可能需要实际的token
        }
        
        function showResult(elementId, message, type = 'info') {
            const resultDiv = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            resultDiv.innerHTML = `
                <div class="result ${type}">
                    <div style="font-size: 12px; color: #666; margin-bottom: 5px;">${timestamp}</div>
                    ${message}
                </div>
            `;
        }
        
        async function checkSystemStatus() {
            showResult('systemStatus', '正在检查系统状态...', 'info');
            
            try {
                // 检查浏览器支持
                const browserSupport = {
                    mediaDevices: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                    mediaRecorder: !!window.MediaRecorder,
                    webSocket: !!window.WebSocket,
                    audioContext: !!(window.AudioContext || window.webkitAudioContext)
                };
                
                // 检查后端服务
                const response = await fetch(`${API_BASE}/api/v1/asr/status`, {
                    headers: getAuthHeaders()
                });
                
                let html = '<h4>系统状态检查结果:</h4>';
                
                // 浏览器支持状态
                html += '<h5>浏览器支持:</h5>';
                for (const [feature, supported] of Object.entries(browserSupport)) {
                    const status = supported ? '✅' : '❌';
                    const statusClass = supported ? 'status-green' : 'status-red';
                    html += `<div><span class="status-indicator ${statusClass}"></span>${feature}: ${status}</div>`;
                }
                
                // 后端服务状态
                if (response.ok) {
                    const result = await response.json();
                    html += '<h5>ASR服务状态:</h5>';
                    html += `<div><span class="status-indicator status-green"></span>服务状态: ${result.status}</div>`;
                    html += `<div><span class="status-indicator status-green"></span>活跃连接: ${result.active_connections}</div>`;
                    
                    if (result.config) {
                        html += '<h5>服务配置:</h5>';
                        for (const [key, value] of Object.entries(result.config)) {
                            const statusClass = value ? 'status-green' : 'status-red';
                            html += `<div><span class="status-indicator ${statusClass}"></span>${key}: ${value ? '✅' : '❌'}</div>`;
                        }
                    }
                } else {
                    html += '<h5>ASR服务状态:</h5>';
                    html += `<div><span class="status-indicator status-red"></span>服务连接失败: ${response.status}</div>`;
                }
                
                showResult('systemStatus', html, 'success');
                
            } catch (error) {
                showResult('systemStatus', `系统状态检查失败: ${error.message}`, 'error');
            }
        }
        
        async function getASRConfig() {
            showResult('configResult', '正在获取ASR配置...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/asr/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({
                        language: 'zh-CN',
                        sample_rate: 16000,
                        format: 'pcm',
                        continuous: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`配置获取失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    let html = '<h4>ASR配置信息:</h4>';
                    html += '<table class="config-table">';
                    html += '<tr><th>配置项</th><th>值</th></tr>';
                    
                    const config = result.config;
                    html += `<tr><td>支持的语言</td><td>${config.supported_languages.join(', ')}</td></tr>`;
                    html += `<tr><td>WebSocket URL</td><td>${config.websocket_url}</td></tr>`;
                    html += `<tr><td>最大时长</td><td>${config.max_duration}秒</td></tr>`;
                    html += `<tr><td>流式支持</td><td>${config.streaming_support ? '是' : '否'}</td></tr>`;
                    
                    if (config.audio_format) {
                        html += '<tr><td colspan="2"><strong>音频格式要求:</strong></td></tr>';
                        for (const [key, value] of Object.entries(config.audio_format)) {
                            html += `<tr><td>${key}</td><td>${value}</td></tr>`;
                        }
                    }
                    
                    html += '</table>';
                    showResult('configResult', html, 'success');
                } else {
                    showResult('configResult', `配置获取失败: ${result.message}`, 'error');
                }
                
            } catch (error) {
                showResult('configResult', `配置获取失败: ${error.message}`, 'error');
            }
        }
        
        async function requestMicrophonePermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                return stream;
            } catch (error) {
                throw new Error(`麦克风权限请求失败: ${error.message}`);
            }
        }
        
        async function toggleRecording() {
            if (isRecording) {
                await stopRecording();
            } else {
                await startRecording();
            }
        }
        
        async function startRecording() {
            try {
                showResult('recordingResult', '正在请求麦克风权限...', 'info');
                
                audioStream = await requestMicrophonePermission();
                
                mediaRecorder = new MediaRecorder(audioStream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                audioChunks = [];
                recordingStartTime = Date.now();
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                
                // 更新UI
                const recordButton = document.getElementById('recordButton');
                recordButton.textContent = '🛑 停止录音';
                recordButton.className = 'record-button recording';
                
                // 显示录音状态
                updateRecordingStatus();
                showAudioVisualizer();
                
                showResult('recordingResult', '录音已开始，请说话...', 'info');
                
            } catch (error) {
                showResult('recordingResult', `录音启动失败: ${error.message}`, 'error');
                isRecording = false;
            }
        }
        
        async function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            
            return new Promise((resolve) => {
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const recordingDuration = (Date.now() - recordingStartTime) / 1000;
                    
                    // 更新UI
                    const recordButton = document.getElementById('recordButton');
                    recordButton.textContent = '🎤 开始录音';
                    recordButton.className = 'record-button';
                    
                    hideAudioVisualizer();
                    
                    // 清理资源
                    if (audioStream) {
                        audioStream.getTracks().forEach(track => track.stop());
                        audioStream = null;
                    }
                    
                    showResult('recordingResult', `录音完成 (${recordingDuration.toFixed(1)}秒)，正在进行语音识别...`, 'info');
                    
                    // 执行语音识别
                    try {
                        const result = await recognizeAudio(audioBlob);
                        resolve(result);
                    } catch (error) {
                        showResult('recordingResult', `语音识别失败: ${error.message}`, 'error');
                        resolve(null);
                    }
                };
                
                mediaRecorder.stop();
                isRecording = false;
            });
        }
        
        async function recognizeAudio(audioBlob) {
            try {
                // 转换音频格式
                const pcmData = await convertAudioToPCM(audioBlob);
                const audioBase64 = arrayBufferToBase64(pcmData);
                
                const response = await fetch(`${API_BASE}/api/v1/asr/interview-recognition`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({
                        audio_data: audioBase64,
                        format: 'pcm',
                        sample_rate: 16000
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`语音识别失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    let html = '<h4>识别结果:</h4>';
                    html += `<div class="transcription">${result.text}</div>`;
                    html += `<div>字数: ${result.word_count || 0} | 置信度: ${(result.confidence * 100).toFixed(1)}%</div>`;
                    
                    showResult('recordingResult', html, 'success');
                    return result;
                } else {
                    showResult('recordingResult', `语音识别失败: ${result.error || '未知错误'}`, 'error');
                    return null;
                }
                
            } catch (error) {
                showResult('recordingResult', `语音识别处理失败: ${error.message}`, 'error');
                return null;
            }
        }
        
        async function convertAudioToPCM(audioBlob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async () => {
                    try {
                        const arrayBuffer = reader.result;
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                        
                        const pcmData = resampleAudio(audioBuffer, 16000);
                        resolve(pcmData);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(audioBlob);
            });
        }
        
        function resampleAudio(audioBuffer, targetSampleRate) {
            const originalSampleRate = audioBuffer.sampleRate;
            const ratio = originalSampleRate / targetSampleRate;
            const originalData = audioBuffer.getChannelData(0);
            const resampledLength = Math.round(originalData.length / ratio);
            const resampledData = new Int16Array(resampledLength);
            
            for (let i = 0; i < resampledLength; i++) {
                const originalIndex = Math.round(i * ratio);
                const sample = originalData[originalIndex] || 0;
                resampledData[i] = Math.round(sample * 32767);
            }
            
            return resampledData.buffer;
        }
        
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }
        
        function updateRecordingStatus() {
            if (!isRecording) return;
            
            const elapsed = (Date.now() - recordingStartTime) / 1000;
            const statusDiv = document.getElementById('recordingStatus');
            statusDiv.innerHTML = `
                <div class="result info">
                    <div>🔴 录音中... ${elapsed.toFixed(1)}秒</div>
                    <div style="font-size: 12px; margin-top: 5px;">说话时请保持声音清晰，避免环境噪音</div>
                </div>
            `;
            
            setTimeout(updateRecordingStatus, 100);
        }
        
        function showAudioVisualizer() {
            const visualizer = document.getElementById('audioVisualizer');
            visualizer.style.display = 'flex';
            visualizer.innerHTML = '';
            
            // 创建音频可视化条
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'audio-bar';
                visualizer.appendChild(bar);
            }
            
            // 模拟音频活动
            const animateBars = () => {
                if (!isRecording) return;
                
                const bars = visualizer.querySelectorAll('.audio-bar');
                bars.forEach(bar => {
                    const height = Math.random() * 30 + 10;
                    bar.style.height = `${height}px`;
                    bar.className = Math.random() > 0.3 ? 'audio-bar active' : 'audio-bar';
                });
                
                setTimeout(animateBars, 100);
            };
            
            animateBars();
        }
        
        function hideAudioVisualizer() {
            const visualizer = document.getElementById('audioVisualizer');
            visualizer.style.display = 'none';
            
            const statusDiv = document.getElementById('recordingStatus');
            statusDiv.innerHTML = '';
        }
        
        async function testRecognition() {
            showResult('recordingResult', '开始测试语音识别...', 'info');
            
            // 生成测试音频（静音）
            const testAudioData = new ArrayBuffer(16000 * 2); // 1秒的静音数据
            const audioBase64 = arrayBufferToBase64(testAudioData);
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/asr/recognize`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({
                        audio_data: audioBase64,
                        format: 'pcm',
                        sample_rate: 16000
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`测试失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    showResult('recordingResult', `测试识别成功！结果: "${result.text}"`, 'success');
                } else {
                    showResult('recordingResult', `测试识别失败: ${result.error}`, 'error');
                }
                
            } catch (error) {
                showResult('recordingResult', `测试识别失败: ${error.message}`, 'error');
            }
        }
        
        async function simulateInterview() {
            showResult('interviewResult', '正在模拟面试场景...', 'info');
            
            const interviewQuestions = [
                "请简单介绍一下您自己。",
                "为什么您对这个职位感兴趣？",
                "您最大的优势是什么？",
                "描述一下您在团队中的角色。",
                "您如何处理工作中的挑战？"
            ];
            
            const randomQuestion = interviewQuestions[Math.floor(Math.random() * interviewQuestions.length)];
            
            let html = '<h4>面试场景模拟:</h4>';
            html += `<div class="transcription">面试官: ${randomQuestion}</div>`;
            html += '<div style="margin: 15px 0;">请点击上方的录音按钮回答这个问题</div>';
            html += '<div style="font-size: 12px; color: #666;">提示: 回答时请注意语速适中，表达清晰</div>';
            
            showResult('interviewResult', html, 'info');
        }
        
        async function runPerformanceTest() {
            showResult('performanceResult', '正在运行性能测试...', 'info');
            
            const startTime = performance.now();
            const testIterations = 5;
            const results = [];
            
            try {
                for (let i = 0; i < testIterations; i++) {
                    const iterationStart = performance.now();
                    
                    // 生成测试音频
                    const testAudioData = new ArrayBuffer(16000 * 2); // 1秒数据
                    const audioBase64 = arrayBufferToBase64(testAudioData);
                    
                    const response = await fetch(`${API_BASE}/api/v1/asr/recognize`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...getAuthHeaders()
                        },
                        body: JSON.stringify({
                            audio_data: audioBase64,
                            format: 'pcm',
                            sample_rate: 16000
                        })
                    });
                    
                    const iterationTime = performance.now() - iterationStart;
                    results.push({
                        iteration: i + 1,
                        time: iterationTime,
                        success: response.ok
                    });
                }
                
                const totalTime = performance.now() - startTime;
                const avgTime = results.reduce((sum, r) => sum + r.time, 0) / results.length;
                const successRate = results.filter(r => r.success).length / results.length;
                
                let html = '<h4>性能测试结果:</h4>';
                html += `<div>总耗时: ${totalTime.toFixed(2)}ms</div>`;
                html += `<div>平均响应时间: ${avgTime.toFixed(2)}ms</div>`;
                html += `<div>成功率: ${(successRate * 100).toFixed(1)}%</div>`;
                html += '<h5>详细结果:</h5>';
                
                results.forEach(result => {
                    html += `<div>第${result.iteration}次: ${result.time.toFixed(2)}ms ${result.success ? '✅' : '❌'}</div>`;
                });
                
                showResult('performanceResult', html, 'success');
                
            } catch (error) {
                showResult('performanceResult', `性能测试失败: ${error.message}`, 'error');
            }
        }
        
        // 页面加载时检查系统状态
        window.addEventListener('load', () => {
            showResult('systemStatus', '页面加载完成，点击按钮开始检查系统状态', 'info');
            
            // 检查浏览器兼容性
            if (!navigator.mediaDevices || !window.MediaRecorder) {
                showResult('systemStatus', '浏览器不支持录音功能，请使用Chrome、Firefox等现代浏览器', 'error');
            }
        });
        
        // 防止页面关闭时录音还在进行
        window.addEventListener('beforeunload', () => {
            if (isRecording) {
                stopRecording();
            }
        });
    </script>
</body>
</html>
