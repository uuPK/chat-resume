server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

metrics_generator:
  processor:
    service_graphs:
    span_metrics:

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
